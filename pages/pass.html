<!-- pages/pass.html -->
<div style="display:flex; flex-direction:column; gap:14px;">
  <section>
    <p class="sec-title"><i class="ti ti-credit-card"></i>定期券のご案内</p>
    <div class="card">
      <div class="card-head"><span class="card-head-l">購入・発売窓口</span></div>
      <div style="padding:12px 14px; display:flex; flex-direction:column; gap:10px;">
        <div style="display:flex; gap:10px; align-items:flex-start; padding-bottom:10px; border-bottom:.5px solid var(--border);">
          <i class="ti ti-device-mobile" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">モバイルSuica</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">スマートフォンから24時間購入・更新が可能。窓口不要。</div>
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:flex-start; padding-bottom:10px; border-bottom:.5px solid var(--border);">
          <i class="ti ti-brand-apple" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">Apple PayのSuica</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">iPhoneのWalletアプリから購入。改札はそのままタッチで通過。</div>
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:flex-start;">
          <i class="ti ti-building" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">みどりの窓口・券売機</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">窓口営業時間 5:30〜22:00。指定席券売機でも定期券の購入・更新が可能。</div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section>
    <p class="sec-title"><i class="ti ti-receipt"></i>定期券の種類と有効期間</p>
    <div class="card" style="padding:12px 14px;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr style="border-bottom:.5px solid var(--border);">
            <th style="padding:5px 8px;text-align:left;color:var(--text-sub);font-weight:500;">種類</th>
            <th style="padding:5px 8px;text-align:left;color:var(--text-sub);font-weight:500;">有効期間</th>
            <th style="padding:5px 8px;text-align:left;color:var(--text-sub);font-weight:500;">備考</th>
          </tr>
        </thead>
        <tbody>
          <tr style="border-bottom:.5px solid var(--border);">
            <td style="padding:6px 8px;font-weight:500;">通勤定期</td>
            <td style="padding:6px 8px;color:var(--text-sub);">1・3・6ヶ月</td>
            <td style="padding:6px 8px;color:var(--text-sub);">Suica定期券対応</td>
          </tr>
          <tr style="border-bottom:.5px solid var(--border);">
            <td style="padding:6px 8px;font-weight:500;">通学定期</td>
            <td style="padding:6px 8px;color:var(--text-sub);">1・3・6ヶ月</td>
            <td style="padding:6px 8px;color:var(--text-sub);">学生証提示が必要</td>
          </tr>
          <tr>
            <td style="padding:6px 8px;font-weight:500;">週末定期</td>
            <td style="padding:6px 8px;color:var(--text-sub);">1ヶ月</td>
            <td style="padding:6px 8px;color:var(--text-sub);">土日・祝日のみ有効</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
