<!-- pages/linemap.html -->
<div style="display:flex; flex-direction:column; gap:14px;">
  <section>
    <p class="sec-title"><i class="ti ti-map"></i>路線図 — 桜川本線</p>
    <div class="card" style="padding:20px 14px;">
      <div style="display:flex; align-items:center; overflow-x:auto; padding:12px 0; gap:0;">
        <!-- 停車駅リスト -->
        <div style="display:flex; align-items:center; gap:0; min-width:max-content;">
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:18px;height:18px;border-radius:50%;background:#2471a3;border:3px solid #fff;box-shadow:0 0 0 1.5px #2471a3;position:relative;z-index:1;"></div>
            <div style="font-size:10px;color:var(--text-sub);margin-top:6px;text-align:center;">大桜</div>
            <div style="position:absolute;top:8px;left:50%;right:0;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:18px;height:18px;border-radius:50%;background:#2471a3;border:3px solid #fff;box-shadow:0 0 0 1.5px #2471a3;position:relative;z-index:1;"></div>
            <div style="font-size:10px;color:var(--text-sub);margin-top:6px;text-align:center;">新緑ヶ丘</div>
            <div style="position:absolute;top:8px;left:0;right:0;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:18px;height:18px;border-radius:50%;background:#2471a3;border:3px solid #fff;box-shadow:0 0 0 1.5px #2471a3;position:relative;z-index:1;"></div>
            <div style="font-size:10px;color:var(--text-sub);margin-top:6px;text-align:center;">東桜川</div>
            <div style="position:absolute;top:8px;left:0;right:0;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:22px;height:22px;border-radius:50%;background:#e74c3c;border:3px solid #fff;box-shadow:0 0 0 2px #e74c3c;position:relative;z-index:1;"></div>
            <div style="font-size:11px;font-weight:700;color:var(--text);margin-top:6px;text-align:center;">桜川</div>
            <div style="position:absolute;top:9px;left:0;right:0;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:18px;height:18px;border-radius:50%;background:#2471a3;border:3px solid #fff;box-shadow:0 0 0 1.5px #2471a3;position:relative;z-index:1;"></div>
            <div style="font-size:10px;color:var(--text-sub);margin-top:6px;text-align:center;">西ノ宮</div>
            <div style="position:absolute;top:8px;left:0;right:0;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:18px;height:18px;border-radius:50%;background:#2471a3;border:3px solid #fff;box-shadow:0 0 0 1.5px #2471a3;position:relative;z-index:1;"></div>
            <div style="font-size:10px;color:var(--text-sub);margin-top:6px;text-align:center;">花坂口</div>
            <div style="position:absolute;top:8px;left:0;right:0;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; min-width:64px; position:relative;">
            <div style="width:18px;height:18px;border-radius:50%;background:#2471a3;border:3px solid #fff;box-shadow:0 0 0 1.5px #2471a3;position:relative;z-index:1;"></div>
            <div style="font-size:10px;color:var(--text-sub);margin-top:6px;text-align:center;">花坂</div>
            <div style="position:absolute;top:8px;left:0;right:50%;height:3px;background:#2471a3;z-index:0;"></div>
          </div>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text-sub);margin-top:12px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#e74c3c;margin-right:5px;vertical-align:middle;"></span>現在地：桜川駅</p>
    </div>
  </section>
  <section>
    <p class="sec-title"><i class="ti ti-info-circle"></i>停車種別</p>
    <div class="card" style="padding:12px 14px;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr style="border-bottom:.5px solid var(--border);">
            <th style="padding:5px 8px;text-align:left;color:var(--text-sub);font-weight:500;">種別</th>
            <th style="padding:5px 8px;text-align:left;color:var(--text-sub);font-weight:500;">停車駅</th>
          </tr>
        </thead>
        <tbody>
          <tr style="border-bottom:.5px solid var(--border);">
            <td style="padding:6px 8px;"><span class="tt-type type-t" style="display:inline-block;">特急</span></td>
            <td style="padding:6px 8px;color:var(--text-sub);">大桜・桜川・花坂のみ停車</td>
          </tr>
          <tr style="border-bottom:.5px solid var(--border);">
            <td style="padding:6px 8px;"><span class="tt-type type-k" style="display:inline-block;">快速</span></td>
            <td style="padding:6px 8px;color:var(--text-sub);">大桜・新緑ヶ丘・桜川・花坂口・花坂</td>
          </tr>
          <tr>
            <td style="padding:6px 8px;"><span class="tt-type type-f" style="display:inline-block;">各停</span></td>
            <td style="padding:6px 8px;color:var(--text-sub);">全駅停車</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
