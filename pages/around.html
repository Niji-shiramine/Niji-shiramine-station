<!-- pages/around.html -->
<div style="display:flex; flex-direction:column; gap:14px;">
  <section>
    <p class="sec-title"><i class="ti ti-map-pin"></i>駅周辺スポット</p>
    <div class="card">
      <div class="card-head"><span class="card-head-l">北東口エリア</span></div>
      <div style="padding:12px 14px; display:flex; flex-direction:column; gap:10px;">
        <div style="display:flex; gap:10px; align-items:flex-start; padding-bottom:10px; border-bottom:.5px solid var(--border);">
          <i class="ti ti-building-bank" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">桜川市役所</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">徒歩約5分。各種証明書・手続きはこちら。</div>
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:flex-start; padding-bottom:10px; border-bottom:.5px solid var(--border);">
          <i class="ti ti-shopping-cart" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">サクラモール（商業施設）</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">徒歩約3分。スーパー・薬局・飲食店が入居。営業：10:00〜21:00</div>
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:flex-start;">
          <i class="ti ti-stethoscope" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">桜川総合病院</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">徒歩約8分。バスでもアクセス可（北東口1番乗り場）。</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:10px;">
      <div class="card-head"><span class="card-head-l">西南口エリア</span></div>
      <div style="padding:12px 14px; display:flex; flex-direction:column; gap:10px;">
        <div style="display:flex; gap:10px; align-items:flex-start; padding-bottom:10px; border-bottom:.5px solid var(--border);">
          <i class="ti ti-school" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">桜川大学</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">徒歩約12分。バス連絡あり（西南口2番乗り場）。</div>
          </div>
        </div>
        <div style="display:flex; gap:10px; align-items:flex-start;">
          <i class="ti ti-trees" style="font-size:20px;color:var(--navy);flex-shrink:0;margin-top:1px;"></i>
          <div>
            <div style="font-size:13px;font-weight:500;">桜川公園</div>
            <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">徒歩約6分。春の桜が有名。駅からの観桜散策ルートあり。</div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section>
    <p class="sec-title"><i class="ti ti-bus"></i>バス乗り場</p>
    <div class="card" style="padding:12px 14px;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr style="border-bottom:.5px solid var(--border);">
            <th style="padding:4px 8px;text-align:left;color:var(--text-sub);font-weight:500;">乗り場</th>
            <th style="padding:4px 8px;text-align:left;color:var(--text-sub);font-weight:500;">主な行き先</th>
          </tr>
        </thead>
        <tbody>
          <tr style="border-bottom:.5px solid var(--border);">
            <td style="padding:6px 8px;font-weight:500;">北東口 1番</td>
            <td style="padding:6px 8px;color:var(--text-sub);">桜川総合病院・桜川市役所前</td>
          </tr>
          <tr style="border-bottom:.5px solid var(--border);">
            <td style="padding:6px 8px;font-weight:500;">北東口 2番</td>
            <td style="padding:6px 8px;color:var(--text-sub);">新緑台団地・東桜川車庫</td>
          </tr>
          <tr>
            <td style="padding:6px 8px;font-weight:500;">西南口 2番</td>
            <td style="padding:6px 8px;color:var(--text-sub);">桜川大学・西ノ宮駅</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
