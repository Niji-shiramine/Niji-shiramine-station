<!-- pages/timetable.html -->
<div style="display:flex; flex-direction:column; gap:14px;">
  <section>
    <p class="sec-title"><i class="ti ti-calendar"></i>時刻表 — 上り（大桜方面）</p>
    <div class="card">
      <div class="card-head">
        <span class="card-head-l">平日ダイヤ</span>
        <span class="card-head-r">2025年3月改正</span>
      </div>
      <div style="padding:12px 14px; overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse; font-size:12px;">
          <thead>
            <tr style="border-bottom:.5px solid var(--border);">
              <th style="padding:4px 8px; text-align:left; color:var(--text-sub); font-weight:500;">時</th>
              <th style="padding:4px 8px; text-align:left; color:var(--text-sub); font-weight:500;">分（種別）</th>
            </tr>
          </thead>
          <tbody>
            <tr style="border-bottom:.5px solid var(--border);">
              <td style="padding:6px 8px; font-weight:700; font-size:15px;">5</td>
              <td style="padding:6px 8px;">30<span style="font-size:10px; color:var(--text-sub)">各</span>　52<span style="font-size:10px; color:var(--text-sub)">各</span></td>
            </tr>
            <tr style="border-bottom:.5px solid var(--border);">
              <td style="padding:6px 8px; font-weight:700; font-size:15px;">6</td>
              <td style="padding:6px 8px;">08<span style="font-size:10px; color:var(--text-sub)">各</span>　21<span style="font-size:10px; color:#2471a3">快</span>　35<span style="font-size:10px; color:var(--text-sub)">各</span>　50<span style="font-size:10px; color:var(--text-sub)">各</span></td>
            </tr>
            <tr style="border-bottom:.5px solid var(--border);">
              <td style="padding:6px 8px; font-weight:700; font-size:15px;">7</td>
              <td style="padding:6px 8px;">05<span style="font-size:10px; color:var(--text-sub)">各</span>　18<span style="font-size:10px; color:#e74c3c">特</span>　25<span style="font-size:10px; color:var(--text-sub)">各</span>　40<span style="font-size:10px; color:#2471a3">快</span>　55<span style="font-size:10px; color:var(--text-sub)">各</span></td>
            </tr>
            <tr style="border-bottom:.5px solid var(--border);">
              <td style="padding:6px 8px; font-weight:700; font-size:15px;">8</td>
              <td style="padding:6px 8px;">02<span style="font-size:10px; color:var(--text-sub)">各</span>　15<span style="font-size:10px; color:#2471a3">快</span>　28<span style="font-size:10px; color:var(--text-sub)">各</span>　45<span style="font-size:10px; color:#e74c3c">特</span></td>
            </tr>
            <tr>
              <td style="padding:6px 8px; color:var(--text-sub); font-size:11px;" colspan="2">… 以下省略。完全版は公式時刻表をご参照ください。</td>
            </tr>
          </tbody>
        </table>
        <p style="font-size:10px; color:var(--text-sub); margin-top:8px;">特=特急　快=快速　各=各駅停車</p>
      </div>
    </div>
  </section>
  <section>
    <p class="sec-title"><i class="ti ti-calendar"></i>時刻表 — 下り（花坂方面）</p>
    <div class="card">
      <div class="card-head">
        <span class="card-head-l">平日ダイヤ</span>
        <span class="card-head-r">2025年3月改正</span>
      </div>
      <div style="padding:12px 14px;">
        <p style="font-size:12px; color:var(--text-sub);">下り時刻表は準備中です。窓口または公式アプリをご確認ください。</p>
      </div>
    </div>
  </section>
</div>
